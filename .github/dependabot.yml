version: 2
updates:
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"

  # npm — TerraformTaskV5
  - package-ecosystem: "npm"
    directory: "/Tasks/TerraformTask/TerraformTaskV5"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
    open-pull-requests-limit: 10
    ignore:
      # ts-node (the test transpiler) does not support TypeScript 6 yet.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  # npm — TerraformInstallerV1
  - package-ecosystem: "npm"
