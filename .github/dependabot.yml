version: 2
updates:
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
    groups:
      # Minor/patch Action bumps are low-risk and numerous; batch them into one
      # PR so a solo maintainer isn't triaging dozens of near-identical bumps
      # (issue #639). Majors stay ungrouped for individual review.
      actions-minor-patch:
        update-types: ["minor", "patch"]

  # npm — TerraformTaskV5
  - package-ecosystem: "npm"
    directory: "/Tasks/TerraformTask/TerraformTaskV5"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
    open-pull-requests-limit: 10
    groups:
      # Batch low-risk devDependency minor/patch bumps into one PR per task so
      # the moderate/low-severity triage path SECURITY.md describes stays
      # tractable for a solo maintainer across 11 task ecosystems (issue #639).
      # Runtime dependencies (e.g. azure-pipelines-task-lib) and any major bump
      # stay ungrouped for individual review.
      dev-dependencies:
        dependency-type: "development"
        update-types: ["minor", "patch"]
    ignore:
      # ts-node (the test transpiler) does not support TypeScript 6 yet.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

