version: 2
updates:
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"

  # npm — TerraformTaskV5
  - package-ecosystem: "npm"
    directory: "/Tasks/TerraformTask/TerraformTaskV5"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
    open-pull-requests-limit: 10
    ignore:
      # ts-node (the test transpiler) does not support TypeScript 6 yet.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  # npm — TerraformInstallerV1
  - package-ecosystem: "npm"
    directory: "/Tasks/TerraformInstaller/TerraformInstallerV1"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
    open-pull-requests-limit: 10
    ignore:
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  # npm — TerraformProviderMirrorV1
  - package-ecosystem: "npm"
    directory: "/Tasks/TerraformProviderMirror/TerraformProviderMirrorV1"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
    open-pull-requests-limit: 10
    ignore:
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  # npm — TerraformModulePublishV1
  - package-ecosystem: "npm"
    directory: "/Tasks/TerraformModulePublish/TerraformModulePublishV1"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
    open-pull-requests-limit: 10
    ignore:
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  # npm — PolicyAgentInstallerV1
  - package-ecosystem: "npm"
    directory: "/Tasks/PolicyAgentInstaller/PolicyAgentInstallerV1"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
    open-pull-requests-limit: 10
    ignore:
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  # npm — TerraformPolicyCheckV1
  - package-ecosystem: "npm"
    directory: "/Tasks/TerraformPolicyCheck/TerraformPolicyCheckV1"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
    open-pull-requests-limit: 10
    ignore:
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  # npm — root (build tooling)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      # tfx-cli 0.23.3 pulls in lodash with HIGH advisories; pinned to 0.23.2.
      - dependency-name: "tfx-cli"
        versions: [">=0.23.3"]
