---
name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.2.3)'
        required: true

jobs:
  guard:
    name: Verify tag is on main
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check tag reachable from main
        run: |
          TAG="${{ github.ref_name || github.event.inputs.tag }}"
          git fetch origin main
          if ! git merge-base --is-ancestor "refs/tags/${TAG}" origin/main 2>/dev/null; then
            echo "Tag ${TAG} is not reachable from origin/main. Releases must be tagged on main." >&2
            exit 1
          fi

  ci:
    name: CI (build + test)
    needs: guard
    uses: ./.github/workflows/unit-test.yml

  build:
    name: Build release bundle
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install root dependencies
        run: npm install --include=dev
      - name: Build release
        run: npm run build:release
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: build/
          retention-days: 1

  package:
    name: Package extension (.vsix)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install root dependencies
        run: npm install --include=dev
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build
          path: build/
      - name: Package extension
        run: npm run package:release
      - name: Upload vsix artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: '*.vsix'
          retention-days: 7

  publish-marketplace:
    name: Publish to VS Marketplace
    needs: package
    runs-on: ubuntu-latest
    environment: marketplace
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install root dependencies
        run: npm install --include=dev
      - name: Download vsix artifact
        uses: actions/download-artifact@v4
        with:
          name: vsix
      - name: Publish extension
        run: |
          VSIX_FILE=$(ls *.vsix | head -1)
          npx tfx-cli extension publish --vsix "$VSIX_FILE" --token "${{ secrets.TFX_PAT }}"

  github-release:
    name: Create GitHub Release
    needs: publish-marketplace
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download vsix artifact
        uses: actions/download-artifact@v4
        with:
          name: vsix
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: '*.vsix'
          generate_release_notes: true
          tag_name: ${{ github.ref_name || github.event.inputs.tag }}
