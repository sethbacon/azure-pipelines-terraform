---
name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.2.3)'
        required: true

permissions:
  contents: read

jobs:
  guard:
    name: Verify tag is on main
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Check tag reachable from main
        run: |
          TAG="${{ github.ref_name || github.event.inputs.tag }}"
          git fetch origin main
          if ! git merge-base --is-ancestor "refs/tags/${TAG}" origin/main 2>/dev/null; then
            echo "Tag ${TAG} is not reachable from origin/main. Releases must be tagged on main." >&2
            exit 1
          fi
      - name: Verify extension version matches tag
        run: |
          TAG="${{ github.ref_name || github.event.inputs.tag }}"
          TAG_VERSION="${TAG#v}"
          EXT_VERSION=$(node -p "require('./azure-devops-extension.json').version")
          if [ "$TAG_VERSION" != "$EXT_VERSION" ]; then
            echo "::error::Tag version (${TAG_VERSION}) does not match azure-devops-extension.json version (${EXT_VERSION}). Update the extension manifest before tagging."
            exit 1
          fi

  ci:
    name: CI (build + test)
    needs: guard
    uses: ./.github/workflows/unit-test.yml

  build:
    name: Build release bundle
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '20'
      - name: Install root dependencies
        run: npm install --include=dev
      - name: Build release
        run: npm run build:release
      - name: Upload build artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: build
          path: build/
          retention-days: 1

  package:
    name: Package extension (.vsix)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '20'
      - name: Install root dependencies
        run: npm install --include=dev
      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: build
          path: build/
      - name: Package extension
        run: npm run package:release
      - name: Upload vsix artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: vsix
          path: '*.vsix'
          retention-days: 7

  publish-marketplace:
    name: Publish to VS Marketplace
    needs: package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '20'
      - name: Install root dependencies
        run: npm install --include=dev
      - name: Download vsix artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: vsix
      - name: Publish extension
        run: |
          VSIX_FILE=$(ls *.vsix | head -1)
          ./node_modules/.bin/tfx extension publish --vsix "$VSIX_FILE" --token "${{ secrets.TFX_PAT }}"

  github-release:
    name: Create GitHub Release
    needs: publish-marketplace
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Download vsix artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: vsix
      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          files: '*.vsix'
          generate_release_notes: true
          tag_name: ${{ github.ref_name || github.event.inputs.tag }}
