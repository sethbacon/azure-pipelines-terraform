---
name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.2.3)"
        required: true

permissions:
  contents: read

jobs:
  guard:
    name: Verify tag is on main
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.resolve-sha.outputs.sha }}
    steps:
      # Preventive, release-time mirror of weekly-security.yml's
      # verify-marketplace-environment-protection job (which is only a weekly
      # DETECTIVE canary): assert the 'marketplace' environment that gates
      # publish-marketplace still has a required-reviewer rule, as an early
      # BLOCKING step so a silently removed/misconfigured reviewer rule fails
      # THIS release instead of going unnoticed until the next Monday scan.
      # Same GET /repos/.../environments/{name} call and same contents:read
      # token (inherited from the workflow-level permissions) as the weekly job;
      # the only deliberate divergence is fail-closed error handling (setFailed,
      # not the weekly canary's soft warning) — a release must not publish past
      # a gate it could not verify.
      - name: Verify marketplace environment protection
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const ENVIRONMENT = 'marketplace';
            let env;
            try {
              const response = await github.request('GET /repos/{owner}/{repo}/environments/{environment_name}', {
                owner: context.repo.owner,
                repo: context.repo.repo,
                environment_name: ENVIRONMENT,
              });
              env = response.data;
            } catch (err) {
              if (err.status === 404) {
                core.setFailed(`The '${ENVIRONMENT}' GitHub Environment does not exist — publish-marketplace in release.yml references an environment with no protection rules at all.`);
                return;
              }
              core.setFailed(`Could not verify the '${ENVIRONMENT}' environment's protection rules (HTTP ${err.status ?? 'unknown'}): ${err.message}. Failing the release rather than publishing past an unverifiable gate.`);
              return;
            }

            const rules = env.protection_rules ?? [];
            const requiredReviewersRule = rules.find((rule) => rule.type === 'required_reviewers');
            const hasRequiredReviewers = Boolean(requiredReviewersRule && Array.isArray(requiredReviewersRule.reviewers) && requiredReviewersRule.reviewers.length > 0);

            if (!hasRequiredReviewers) {
              core.setFailed(
                `The '${ENVIRONMENT}' GitHub Environment has no required-reviewer protection rule configured. ` +
                `CLAUDE.md documents this as mandatory ("must have at least one required reviewer") for every VS Marketplace publish. ` +
                `Configure it under Settings -> Environments -> ${ENVIRONMENT} -> Required reviewers.`
              );
              return;
            }

            core.info(`OK: '${ENVIRONMENT}' environment has ${requiredReviewersRule.reviewers.length} required reviewer(s) configured.`);
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}
          fetch-depth: 0
          persist-credentials: false
      - name: Check tag reachable from main
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "refs/tags/${TAG}" origin/main 2>/dev/null; then
            echo "Tag ${TAG} is not reachable from origin/main. Releases must be tagged on main." >&2
            exit 1
          fi
      - name: Verify extension version matches tag
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          TAG_VERSION="${TAG#v}"
          EXT_VERSION=$(node -p "require('./azure-devops-extension.json').version")
          if [ "$TAG_VERSION" != "$EXT_VERSION" ]; then
            echo "::error::Tag version (${TAG_VERSION}) does not match azure-devops-extension.json version (${EXT_VERSION}). Merge the release-please PR before tagging."
            exit 1
          fi
      - name: Verify per-task Minor bumps
        run: |
          # Fail the release if any task's src/ changed since the previous release tag
          # without its task.json Minor being bumped: ADO agents cache tasks by
          # Major.Minor, so an un-bumped fix would ship to the Marketplace but never
          # reach running agents.
          node scripts/check-minor-bumps.js
      - name: Resolve validated commit SHA
        id: resolve-sha
        # Every downstream job checks out this exact commit instead of
        # re-resolving the tag name, so nothing published later in the
        # pipeline can be swapped out by a tag move after this point.
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  ci:
    name: CI (build + test)
    needs: guard
    uses: ./.github/workflows/unit-test.yml

  build:
    name: Build release bundle
    needs: [guard, ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ needs.guard.outputs.sha }}
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
      - name: Install root dependencies
        run: npm ci --ignore-scripts
      - name: Build release
        run: npm run build:release
      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: build
          path: build/
          retention-days: 1

  package:
    name: Package extension (.vsix)
    needs: [guard, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ needs.guard.outputs.sha }}
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
      - name: Install root dependencies
        run: npm ci --ignore-scripts
      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: build
          path: build/
      - name: Package extension
        run: npm run package:release
      - name: Upload vsix artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vsix
          path: "*.vsix"
          retention-days: 7

  sbom-and-sign:
    name: Generate SBOM and sign VSIX
    needs: [guard, package]
    permissions:
      contents: read
      id-token: write
      attestations: write # required by attest-build-provenance / attest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ needs.guard.outputs.sha }}
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
      # --ignore-scripts: this job holds id-token/attestations:write. tfx-cli and
      # @cyclonedx/cyclonedx-npm are pure-JS and need no lifecycle scripts to run
      # (verified against azure-pipelines-packer's identical fix, #102); skipping
      # scripts denies a compromised transitive dependency (e.g. a routine
      # lockfile bump) code execution in this privileged context.
      - name: Install root dependencies
        run: npm ci --ignore-scripts
      - name: Generate SBOM for TerraformTaskV5
        run: |
          cd Tasks/TerraformTask/TerraformTaskV5
          npm ci --omit=dev --ignore-scripts
          npx --no-install cyclonedx-npm --output-file ../../../sbom-terraform-task-v5.cdx.json --omit dev
      - name: Generate SBOM for TerraformInstallerV1
        run: |
          cd Tasks/TerraformInstaller/TerraformInstallerV1
          npm ci --omit=dev --ignore-scripts
          npx --no-install cyclonedx-npm --output-file ../../../sbom-terraform-installer-v1.cdx.json --omit dev
      - name: Generate SBOM for TerraformProviderMirrorV1
        run: |
          cd Tasks/TerraformProviderMirror/TerraformProviderMirrorV1
          npm ci --omit=dev --ignore-scripts
          npx --no-install cyclonedx-npm --output-file ../../../sbom-terraform-provider-mirror-v1.cdx.json --omit dev
      - name: Generate SBOM for PolicyAgentInstallerV1
        run: |
          cd Tasks/PolicyAgentInstaller/PolicyAgentInstallerV1
          npm ci --omit=dev --ignore-scripts
          npx --no-install cyclonedx-npm --output-file ../../../sbom-policy-agent-installer-v1.cdx.json --omit dev
      - name: Generate SBOM for TerraformPolicyCheckV1
        run: |
          cd Tasks/TerraformPolicyCheck/TerraformPolicyCheckV1
          npm ci --omit=dev --ignore-scripts
          npx --no-install cyclonedx-npm --output-file ../../../sbom-terraform-policy-check-v1.cdx.json --omit dev
      - name: Generate SBOM for TerraformDriftReportV1
        run: |
          cd Tasks/TerraformDriftReport/TerraformDriftReportV1
          npm ci --omit=dev --ignore-scripts
          npx --no-install cyclonedx-npm --output-file ../../../sbom-terraform-drift-report-v1.cdx.json --omit dev
      - name: Generate SBOM for TerraformModulePublishV1
        run: |
          cd Tasks/TerraformModulePublish/TerraformModulePublishV1
          npm ci --omit=dev --ignore-scripts
          npx --no-install cyclonedx-npm --output-file ../../../sbom-terraform-module-publish-v1.cdx.json --omit dev
      - name: Generate SBOM for TerraformDocsInstallerV1
        run: |
          cd Tasks/TerraformDocsInstaller/TerraformDocsInstallerV1
          npm ci --omit=dev --ignore-scripts
          npx --no-install cyclonedx-npm --output-file ../../../sbom-terraform-docs-installer-v1.cdx.json --omit dev
      - name: Generate SBOM for TerraformDocsV1
        run: |
          cd Tasks/TerraformDocs/TerraformDocsV1
          npm ci --omit=dev --ignore-scripts
          npx --no-install cyclonedx-npm --output-file ../../../sbom-terraform-docs-v1.cdx.json --omit dev
      - name: Generate SBOM for Markdown2HtmlV1
        run: |
          cd Tasks/Markdown2Html/Markdown2HtmlV1
          npm ci --omit=dev --ignore-scripts
          npx --no-install cyclonedx-npm --output-file ../../../sbom-markdown2html-v1.cdx.json --omit dev
      - name: Generate SBOM for PublishKbArticleV1
        run: |
          cd Tasks/PublishKbArticle/PublishKbArticleV1
          npm ci --omit=dev --ignore-scripts
          npx --no-install cyclonedx-npm --output-file ../../../sbom-publish-kb-article-v1.cdx.json --omit dev
      - name: Generate SBOM for tab
        # The Terraform results tab ships as build/tab/tabContent.js inside the
        # .vsix — webpack bundles react, react-dom, azure-devops-extension-sdk and
        # azure-devops-extension-api into it. Those four live in the ROOT
        # package.json's devDependencies (alongside pure build tooling like
        # webpack/tfx-cli/jest), because the root manifest has no runtime
        # "dependencies" of its own. A `--omit dev` scan here would therefore emit
        # an EMPTY SBOM, so — unlike the 11 per-task steps above — the tab SBOM is
        # generated over the full (dev-included) root install. This over-captures
        # the build tooling that never ships in the bundle, but it is the only way
        # to capture the tab's actual bundled runtime closure without a
        # hand-maintained allowlist. The root `npm ci --ignore-scripts` above
        # already installed the full dev tree, so no reinstall is needed here.
        run: npx --no-install cyclonedx-npm --output-file sbom-tab.cdx.json
      - name: Download vsix artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: vsix
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Sign VSIX with cosign keyless
        run: |
          VSIX_FILE=$(find . -maxdepth 1 -name "*.vsix" -print -quit)
          cosign sign-blob --yes "$VSIX_FILE" --bundle "${VSIX_FILE}.bundle"
      # GitHub-native build provenance + SBOM attestations for the published .vsix.
      # Verifiable with: gh attestation verify <file.vsix> --repo sethbacon/azure-pipelines-terraform
      - name: Attest build provenance for VSIX
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: "*.vsix"
      - name: Attest SBOM (TerraformTaskV5) for VSIX
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: "*.vsix"
          sbom-path: "sbom-terraform-task-v5.cdx.json"
      - name: Attest SBOM (TerraformInstallerV1) for VSIX
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: "*.vsix"
          sbom-path: "sbom-terraform-installer-v1.cdx.json"
      - name: Attest SBOM (TerraformProviderMirrorV1) for VSIX
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: "*.vsix"
          sbom-path: "sbom-terraform-provider-mirror-v1.cdx.json"
      - name: Attest SBOM (PolicyAgentInstallerV1) for VSIX
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: "*.vsix"
          sbom-path: "sbom-policy-agent-installer-v1.cdx.json"
      - name: Attest SBOM (TerraformPolicyCheckV1) for VSIX
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: "*.vsix"
          sbom-path: "sbom-terraform-policy-check-v1.cdx.json"
      - name: Attest SBOM (TerraformDriftReportV1) for VSIX
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: "*.vsix"
          sbom-path: "sbom-terraform-drift-report-v1.cdx.json"
      - name: Attest SBOM (TerraformModulePublishV1) for VSIX
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: "*.vsix"
          sbom-path: "sbom-terraform-module-publish-v1.cdx.json"
      - name: Attest SBOM (TerraformDocsInstallerV1) for VSIX
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: "*.vsix"
          sbom-path: "sbom-terraform-docs-installer-v1.cdx.json"
      - name: Attest SBOM (TerraformDocsV1) for VSIX
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: "*.vsix"
          sbom-path: "sbom-terraform-docs-v1.cdx.json"
      - name: Attest SBOM (Markdown2HtmlV1) for VSIX
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: "*.vsix"
          sbom-path: "sbom-markdown2html-v1.cdx.json"
      - name: Attest SBOM (PublishKbArticleV1) for VSIX
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: "*.vsix"
          sbom-path: "sbom-publish-kb-article-v1.cdx.json"
      - name: Attest SBOM (tab) for VSIX
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: "*.vsix"
          sbom-path: "sbom-tab.cdx.json"
      - name: Upload SBOM and signature artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-and-signatures
          path: |
            sbom-*.cdx.json
            *.vsix.bundle
          retention-days: 7

  draft-release:
    name: Create Draft GitHub Release
    needs: [guard, package, sbom-and-sign]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create_release.outputs.id }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ needs.guard.outputs.sha }}
          fetch-depth: 0
          persist-credentials: false
      - name: Download vsix artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: vsix
      - name: Download SBOM and signature artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: sbom-and-signatures
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      # Same integrity gate as publish-marketplace: verify the VSIX against its
      # cosign bundle (identity/issuer pinned to this repo's release.yml) before
      # attaching it to the GitHub Release, so the release never distributes an
      # artifact that fails signature verification. This release stays a draft
      # until publish-marketplace succeeds (undraft-release), so a failure here
      # blocks publication too.
      - name: Verify VSIX signature before release
        run: |
          VSIX_FILE=$(find . -maxdepth 1 -name "*.vsix" -print -quit)
          cosign verify-blob \
            --bundle "${VSIX_FILE}.bundle" \
            --certificate-identity-regexp '^https://github\.com/sethbacon/azure-pipelines-terraform/\.github/workflows/release\.yml@refs/(tags/v[0-9]+\.[0-9]+\.[0-9]+|heads/main)$' \
            --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \
            "$VSIX_FILE"
      - name: Create draft GitHub Release
        id: create_release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: |
            *.vsix
            sbom-*.cdx.json
            *.vsix.bundle
          generate_release_notes: true
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          draft: true

  publish-marketplace:
    name: Publish to VS Marketplace
    needs: [guard, draft-release]
    runs-on: ubuntu-latest
    environment: marketplace
    permissions:
      id-token: write # GitHub OIDC -> Microsoft Entra federated credential
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ needs.guard.outputs.sha }}
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
      # --ignore-scripts: this job holds id-token:write for the Entra federated
      # credential. tfx-cli is pure-JS and needs no lifecycle scripts to run;
      # skipping scripts denies a compromised transitive dependency code
      # execution alongside the token-minting step below (see SECURITY.md).
      - name: Install root dependencies
        run: npm ci --ignore-scripts
      - name: Download vsix artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: vsix
      # The signing job (sbom-and-sign) produced a cosign keyless sign-blob
      # bundle over the exact VSIX bytes and uploaded it in sbom-and-signatures.
      # Re-download it here so the integrity gate below verifies the SAME bytes
      # that are about to be published, not merely that "some valid signature
      # exists" somewhere.
      - name: Download SBOM and signature artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: sbom-and-signatures
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      # Integrity gate: re-verify the downloaded VSIX against the cosign bundle
      # from sbom-and-sign BEFORE the token-authenticated publish, pinning the
      # signer identity to THIS repo's release.yml workflow and the GitHub
      # Actions OIDC issuer (the same identity/issuer anchoring the OpenTofu
      # cosign canary in weekly-security.yml uses). An artifact substituted
      # between jobs — a compromised actions/download-artifact, or an
      # artifact-store isolation failure — fails the release here rather than
      # being published to the Marketplace. `--bundle` carries the cert +
      # Rekor entry, so no id-token is needed for verification.
      - name: Verify VSIX signature before publish
        run: |
          VSIX_FILE=$(find . -maxdepth 1 -name "*.vsix" -print -quit)
          cosign verify-blob \
            --bundle "${VSIX_FILE}.bundle" \
            --certificate-identity-regexp '^https://github\.com/sethbacon/azure-pipelines-terraform/\.github/workflows/release\.yml@refs/(tags/v[0-9]+\.[0-9]+\.[0-9]+|heads/main)$' \
            --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \
            "$VSIX_FILE"
      # Authenticate to Microsoft Entra via GitHub OIDC (federated credential) —
      # no stored secret. The service principal is a member of the 'sethbacon'
      # Marketplace publisher. Replaces the deprecated full-scoped TFX_PAT.
      - name: Azure login (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ vars.AZDO_PUBLISH_CLIENT_ID }}
          tenant-id: ${{ vars.AZDO_PUBLISH_TENANT_ID }}
          allow-no-subscriptions: true
      - name: Publish extension with a Microsoft Entra token
        run: |
          VSIX_FILE=$(find . -maxdepth 1 -name "*.vsix" -print -quit)
          # 499b84ac-1321-427f-aa17-267ca6975798 is the Azure DevOps resource app.
          ENTRA_TOKEN=$(az account get-access-token \
            --tenant "${VARS_AZDO_PUBLISH_TENANT_ID}" \
            --resource 499b84ac-1321-427f-aa17-267ca6975798 \
            --query accessToken -o tsv)
          # Mask the runtime-minted token so it is redacted from any log output.
          echo "::add-mask::$ENTRA_TOKEN"
          # Supply the token via stdin, NOT on argv: with --token omitted and
          # --auth-type pat set, tfx-cli 0.23.2 reads the token from its masked
          # "Personal access token:" prompt on stdin (verified against 0.23.2:
          # getCredentials() -> token.val() -> qread/prompt), so the token never
          # appears in /proc/<pid>/cmdline or `ps` (CWE-214). `printf` is a bash
          # builtin, so it spawns no argv-visible helper process either.
          printf '%s\n' "$ENTRA_TOKEN" | ./node_modules/.bin/tfx extension publish --vsix "$VSIX_FILE" --auth-type pat
        env:
          VARS_AZDO_PUBLISH_TENANT_ID: ${{ vars.AZDO_PUBLISH_TENANT_ID }}

  undraft-release:
    name: Undraft GitHub Release
    needs: [draft-release, publish-marketplace]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Undraft the release
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          RELEASE_ID: ${{ needs.draft-release.outputs.release_id }}
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: Number(process.env.RELEASE_ID),
              draft: false
            });
