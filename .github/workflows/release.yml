---
name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.2.3)'
        required: true

permissions:
  contents: read

jobs:
  guard:
    name: Verify tag is on main
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Check tag reachable from main
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          git fetch origin main
          if ! git merge-base --is-ancestor "refs/tags/${TAG}" origin/main 2>/dev/null; then
            echo "Tag ${TAG} is not reachable from origin/main. Releases must be tagged on main." >&2
            exit 1
          fi
      - name: Verify extension version matches tag
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          TAG_VERSION="${TAG#v}"
          EXT_VERSION=$(node -p "require('./azure-devops-extension.json').version")
          if [ "$TAG_VERSION" != "$EXT_VERSION" ]; then
            echo "::error::Tag version (${TAG_VERSION}) does not match azure-devops-extension.json version (${EXT_VERSION}). Update the extension manifest before tagging."
            exit 1
          fi
      - name: Verify changelog has entry for release version
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          TAG_VERSION="${TAG#v}"
          if ! grep -qE "^## \[?${TAG_VERSION}\]?" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no entry matching version ${TAG_VERSION}. Add a changelog section before releasing."
            exit 1
          fi

  ci:
    name: CI (build + test)
    needs: guard
    uses: ./.github/workflows/unit-test.yml

  build:
    name: Build release bundle
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
      - name: Install root dependencies
        run: npm install --include=dev
      - name: Build release
        run: npm run build:release
      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: build
          path: build/
          retention-days: 1

  package:
    name: Package extension (.vsix)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
      - name: Install root dependencies
        run: npm install --include=dev
      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: build
          path: build/
      - name: Package extension
        run: npm run package:release
      - name: Upload vsix artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vsix
          path: '*.vsix'
          retention-days: 7

  sbom-and-sign:
    name: Generate SBOM and sign VSIX
    needs: package
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
      - name: Install CycloneDX
        run: npm install --no-save @cyclonedx/cyclonedx-npm
      - name: Generate SBOM for TerraformTaskV5
        run: |
          cd Tasks/TerraformTask/TerraformTaskV5
          npm install --omit=dev
          npx @cyclonedx/cyclonedx-npm --output-file ../../../sbom-terraform-task-v5.cdx.json --omit dev
      - name: Generate SBOM for TerraformInstallerV1
        run: |
          cd Tasks/TerraformInstaller/TerraformInstallerV1
          npm install --omit=dev
          npx @cyclonedx/cyclonedx-npm --output-file ../../../sbom-terraform-installer-v1.cdx.json --omit dev
      - name: Download vsix artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: vsix
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Sign VSIX with cosign keyless
        run: |
          VSIX_FILE=$(find . -maxdepth 1 -name "*.vsix" -print -quit)
          cosign sign-blob --yes "$VSIX_FILE" --bundle "${VSIX_FILE}.bundle"
      - name: Upload SBOM and signature artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-and-signatures
          path: |
            sbom-*.cdx.json
            *.vsix.bundle
          retention-days: 7

  draft-release:
    name: Create Draft GitHub Release
    needs: [package, sbom-and-sign]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create_release.outputs.id }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Download vsix artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: vsix
      - name: Download SBOM and signature artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: sbom-and-signatures
      - name: Create draft GitHub Release
        id: create_release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: |
            *.vsix
            sbom-*.cdx.json
            *.vsix.bundle
          generate_release_notes: true
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          draft: true

  publish-marketplace:
    name: Publish to VS Marketplace
    needs: draft-release
    runs-on: ubuntu-latest
    environment: marketplace
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
      - name: Install root dependencies
        run: npm install --include=dev
      - name: Download vsix artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: vsix
      - name: Publish extension
        run: |
          VSIX_FILE=$(find . -maxdepth 1 -name "*.vsix" -print -quit)
          ./node_modules/.bin/tfx extension publish --vsix "$VSIX_FILE" --token "${{ secrets.TFX_PAT }}"

  undraft-release:
    name: Undraft GitHub Release
    needs: [draft-release, publish-marketplace]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Undraft the release
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.draft-release.outputs.release_id }},
              draft: false
            });
