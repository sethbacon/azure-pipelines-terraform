---
name: Weekly Security Scan

on:
  schedule:
    - cron: "0 8 * * 1" # Every Monday 08:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/unit-test.yml

  # ── OSV Vulnerability Scan ────────────────────────────
  osv-scan:
    name: OSV Vulnerability Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Run OSV-Scanner
        id: osv
        uses: google/osv-scanner-action/osv-scanner-action@c51854704019a247608d928f370c98740469d4b5 # v2.3.5
        continue-on-error: true
        with:
          scan-args: |-
            --recursive
            .
            --format=table
            --output=osv-results.txt

      # Surface the scan result in the run's Summary tab so a reviewer sees the
      # findings (or a clean result) without opening the step logs. Runs even
      # when the scan step reports vulnerabilities (continue-on-error above).
      - name: Publish OSV results to job summary
        if: always()
        run: |
          {
            echo '## OSV-Scanner Results'
            echo ''
            if [ -s osv-results.txt ]; then
              echo '```'
              cat osv-results.txt
              echo '```'
            else
              echo 'No known vulnerabilities found.'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create issue on new vulnerabilities
        if: steps.osv.outcome == 'failure'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const title = `OSV-Scanner: vulnerabilities found — ${new Date().toISOString().slice(0,10)}`;
            const body = [
              '## OSV-Scanner Vulnerability Report',
              '',
              `**Workflow run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              '',
              'OSV-Scanner found known vulnerabilities in npm dependencies. Please review the run summary (or the workflow logs) and update affected packages.',
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['security', 'dependencies'],
            });

  # ── Stale Dependabot PRs ──────────────────────────────
  stale-dependabot:
    name: Flag stale Dependabot PRs
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Label PRs open > 14 days
        id: label-stale
        # continue-on-error keeps a transient labeling hiccup from failing the
        # whole weekly run, but (unlike the old blanket `|| true`) the failure is
        # no longer swallowed: `set -o pipefail` propagates a `gh pr list` error
        # through the pipe, and the follow-up step surfaces any non-zero exit to
        # the run summary. Mirrors the osv-scan job's continue-on-error + explicit
        # outcome-check pattern above.
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --author "app/dependabot" \
            --state open \
            --json number,createdAt,title \
            --jq '.[] | select((.createdAt | fromdateiso8601) < (now - 1209600)) | .number' \
          | xargs -r -I{} gh pr edit {} \
              --repo "$GITHUB_REPOSITORY" \
              --add-label "stale-security-patch"
      - name: Surface stale-PR labeling failures
        if: steps.label-stale.outcome == 'failure'
        run: |
          {
            echo '## Stale Dependabot PR labeling FAILED'
            echo ''
            echo 'The stale-Dependabot labeling step exited non-zero (a gh API/auth/rate-limit error, or a missing stale-security-patch label). Stale security PRs may not have been flagged this run; see the step logs.'
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::warning::Stale Dependabot PR labeling failed; see the run summary and step logs."

  # ── Marketplace environment protection verification ───
  # Verifies the `marketplace` GitHub Environment (which gates publish-marketplace
  # in release.yml) has at least one required reviewer configured. This closes the
  # verifiability gap from audit finding #19/#396: the "must have at least one
  # required reviewer" policy (CLAUDE.md) was previously asserted only in prose,
  # with no repository-visible or CI-checked source of truth, so silent removal
  # or misconfiguration of the rule would go undetected.
  verify-marketplace-environment-protection:
    name: Verify marketplace environment protection
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check required reviewers on the marketplace environment
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const ENVIRONMENT = 'marketplace';
            let env;
            try {
              const response = await github.request('GET /repos/{owner}/{repo}/environments/{environment_name}', {
                owner: context.repo.owner,
                repo: context.repo.repo,
                environment_name: ENVIRONMENT,
              });
              env = response.data;
            } catch (err) {
              if (err.status === 404) {
                core.setFailed(`The '${ENVIRONMENT}' GitHub Environment does not exist — publish-marketplace in release.yml references an environment with no protection rules at all.`);
                return;
              }
              // Confirmed against GitHub's REST API docs: reading environment
              // protection rules only requires ordinary repo read access (unlike
              // branch-protection/admin-settings endpoints, which need the
              // `administration` permission -- a scope GITHUB_TOKEN cannot grant
              // at all). A failure here is therefore unexpected; surface it
              // distinctly from a real policy gap so the two aren't confused.
              core.warning(`Could not verify the '${ENVIRONMENT}' environment's protection rules (HTTP ${err.status ?? 'unknown'}): ${err.message}. Verify manually via Settings -> Environments.`);
              return;
            }

            const rules = env.protection_rules ?? [];
            const requiredReviewersRule = rules.find((rule) => rule.type === 'required_reviewers');
            const hasRequiredReviewers = Boolean(requiredReviewersRule && Array.isArray(requiredReviewersRule.reviewers) && requiredReviewersRule.reviewers.length > 0);

            if (!hasRequiredReviewers) {
              core.setFailed(
                `The '${ENVIRONMENT}' GitHub Environment has no required-reviewer protection rule configured. ` +
                `CLAUDE.md documents this as mandatory ("must have at least one required reviewer") for every VS Marketplace publish. ` +
                `Configure it under Settings -> Environments -> ${ENVIRONMENT} -> Required reviewers.`
              );
              return;
            }

            core.info(`OK: '${ENVIRONMENT}' environment has ${requiredReviewersRule.reviewers.length} required reviewer(s) configured.`);

  # ── OpenTofu cosign trust-root canary ──────────────────
  # Exercises the installer's REAL verifyCosignSignature() (cosign-verifier.ts) --
  # the exact argv it builds, including the version-bound certificate-identity regexp
  # (buildOpenTofuCertIdentityRegexp, #611) and pinned OIDC issuer -- against a real
  # cosign binary and a current OpenTofu release's SHA256SUMS/.sig/.pem. This is the
  # cosign equivalent of the hashicorp-gpg-canary below: it drives THIS codebase's
  # own invocation end-to-end rather than a hand-typed `cosign verify-blob`, so a bug
  # that only manifests against the real binary (a flag cosign silently ignores, a
  # ToolRunner wiring regression, drift between the pinned identity and OpenTofu's
  # actual release-signing identity, or a cosign CLI/flag change) is caught before it
  # breaks every default OpenTofu install in a customer pipeline (#497b, #656). The
  # per-PR unit-test job installs no cosign (and keyless verify-blob additionally
  # needs Sigstore-network access), so this real end-to-end invocation lives here,
  # where cosign is installed and network is available. Non-required: a failure here
  # only opens an issue via notify-on-failure below, it never blocks a PR.
  opentofu-cosign-canary:
    name: OpenTofu cosign trust-root canary
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: Tasks/TerraformInstaller/TerraformInstallerV1
    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
      - name: Install installer-task dependencies
        run: npm ci --ignore-scripts
      - name: Compile installer task (emits the JS the canary requires)
        run: npm run compile
      - name: Resolve latest OpenTofu release version
        id: version
        run: |
          version=$(curl -fsSL https://api.github.com/repos/opentofu/opentofu/releases/latest | jq -r '.tag_name' | sed 's/^v//')
          if [ -z "$version" ] || [ "$version" = "null" ]; then
            echo "Could not resolve the latest OpenTofu release version" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Download SHA256SUMS
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: curl -fsSL -o SHA256SUMS "https://github.com/opentofu/opentofu/releases/download/v${VERSION}/tofu_${VERSION}_SHA256SUMS"
      - name: Verify SHA256SUMS with the installer's own cosign verifier (real argv, end-to-end)
        env:
          VERSION: ${{ steps.version.outputs.version }}
        # Reuses cosign-verifier.ts's verifyCosignSignature (required=true, so a
        # missing/bad signature or a wrong-identity certificate hard-fails) rather than
        # reimplementing the cosign invocation: it fetches the .sig/.pem from the same
        # GitHub release via the task's own http-client, builds the version-bound
        # identity regexp, and shells out to the real cosign binary with the exact argv
        # a production OpenTofu install uses.
        run: |
          node -e '
            const fs = require("fs");
            const { verifyCosignSignature } = require("./src/cosign-verifier");
            const version = process.env.VERSION;
            const content = fs.readFileSync("SHA256SUMS", "utf8");
            const base = "https://github.com/opentofu/opentofu/releases/download/v" + version + "/tofu_" + version + "_SHA256SUMS";
            verifyCosignSignature(content, base + ".sig", base + ".pem", version, true)
              .then(function () { console.log("OK: OpenTofu cosign signature verified via the task-owned verifier for tofu " + version); })
              .catch(function (err) { console.error("OpenTofu cosign canary FAILED: " + (err && err.message ? err.message : err)); process.exit(1); });
          '

  # ── HashiCorp GPG trust-root canary ────────────────────
  # Exercises the installer's REAL verifyGpgSignature() (gpg-verifier.ts) against
  # the embedded HashiCorp public key (hashicorp-gpg-key.ts) using a current
  # Terraform release's real SHA256SUMS/.sig from releases.hashicorp.com -- the
  # GPG equivalent of the cosign canary above. Catches a HashiCorp key rotation,
  # an openpgp behavior change, or drift in the embedded key before it breaks
  # every default Terraform/Sentinel install in a customer pipeline (#574). It
  # also fails EARLY (60-day lead) if the embedded key is nearing its own expiry,
  # so rotation is proactive rather than a fail-closed outage (#551; cf.
  # HCSEC-2026-03, where the prior key's self-signature lapsing hard-failed
  # ecosystem tooling in April 2026). Non-required: a failure here only opens an
  # issue via notify-on-failure below, it never blocks a PR.
  hashicorp-gpg-canary:
    name: HashiCorp GPG trust-root canary
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: Tasks/TerraformInstaller/TerraformInstallerV1
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
      - name: Install installer-task dependencies
        run: npm ci --ignore-scripts
      - name: Compile installer task (emits the JS the canary requires)
        run: npm run compile
      - name: Resolve latest Terraform release version
        id: version
        run: |
          version=$(curl -fsSL https://checkpoint-api.hashicorp.com/v1/check/terraform | jq -r '.current_version')
          if [ -z "$version" ] || [ "$version" = "null" ]; then
            echo "Could not resolve the latest Terraform release version" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Download SHA256SUMS
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: curl -fsSL -o SHA256SUMS "https://releases.hashicorp.com/terraform/${VERSION}/terraform_${VERSION}_SHA256SUMS"
      - name: Verify SHA256SUMS with the installer's own GPG verifier + embedded key
        env:
          VERSION: ${{ steps.version.outputs.version }}
        # Reuses gpg-verifier.ts's verifyGpgSignature (required=true, so a missing
        # or bad signature hard-fails) rather than reimplementing any crypto; it
        # fetches the .sig from releases.hashicorp.com via the task's own
        # http-client and verifies it against the embedded HASHICORP_GPG_PUBLIC_KEY.
        run: |
          node -e '
            const fs = require("fs");
            const { verifyGpgSignature } = require("./src/gpg-verifier");
            const version = process.env.VERSION;
            const content = fs.readFileSync("SHA256SUMS", "utf8");
            const sigUrl = "https://releases.hashicorp.com/terraform/" + version + "/terraform_" + version + "_SHA256SUMS.sig";
            verifyGpgSignature(content, sigUrl, true)
              .then(function () { console.log("OK: HashiCorp GPG signature verified against the embedded key for terraform " + version); })
              .catch(function (err) { console.error("HashiCorp GPG canary FAILED: " + (err && err.message ? err.message : err)); process.exit(1); });
          '
      - name: Fail if the embedded HashiCorp key or its signing subkey is within 60 days of expiry
        # Loads the embedded key with the task's own openpgp dependency and fails
        # early so the rotation (which must land in BOTH installer copies, gated by
        # check-shared-modules.js) is proactive, never a reactive outage.
        #
        # HashiCorp signs release SHA256SUMS with a signing SUBKEY that can expire
        # before the primary key, so checking only the primary would miss a signing
        # subkey lapse -- the HCSEC-2026-03 class event. We warn on the EARLIEST
        # expiry across the primary key AND every subkey that is CURRENTLY usable for
        # signing (openpgp's getSigningKey view of the active trust path). Rotated-out
        # signing subkeys and encryption-only subkeys are deliberately excluded: the
        # embedded key today carries a long-expired 2022 signing subkey and a 2030
        # encryption subkey, neither of which affects whether signature verification
        # keeps working, and including them would fail this job permanently/spuriously.
        run: |
          node -e '
            const openpgp = require("openpgp");
            const { HASHICORP_GPG_PUBLIC_KEY } = require("./src/hashicorp-gpg-key");
            (async function () {
              const now = new Date();
              const key = await openpgp.readKey({ armoredKey: HASHICORP_GPG_PUBLIC_KEY });
              const components = [{ label: "primary key " + key.getKeyID().toHex(), exp: await key.getExpirationTime() }];
              for (const sub of key.subkeys) {
                let usable = false;
                try { await key.getSigningKey(sub.getKeyID(), now); usable = true; } catch (e) { usable = false; }
                if (!usable) { console.log("Skipping subkey " + sub.getKeyID().toHex() + " (not a currently-usable signing subkey)."); continue; }
                components.push({ label: "signing subkey " + sub.getKeyID().toHex(), exp: await sub.getExpirationTime() });
              }
              let earliest = null;
              for (const c of components) {
                if (c.exp === Infinity) { console.log("OK: " + c.label + " has no expiration set."); continue; }
                if (!c.exp) { console.error("Embedded HashiCorp " + c.label + " expiry could not be determined (getExpirationTime returned " + String(c.exp) + ")."); process.exit(1); }
                console.log("Embedded HashiCorp " + c.label + " expires " + c.exp.toISOString() + ".");
                if (!earliest || c.exp.getTime() < earliest.exp.getTime()) { earliest = c; }
              }
              if (!earliest) { console.log("OK: no embedded HashiCorp key component has an expiration set."); return; }
              const days = Math.floor((earliest.exp.getTime() - Date.now()) / 86400000);
              console.log("Earliest-expiring component: " + earliest.label + " on " + earliest.exp.toISOString() + " (" + days + " days from now).");
              if (days < 60) { console.error("Embedded HashiCorp GPG " + earliest.label + " expires in " + days + " days (< 60). Rotate hashicorp-gpg-key.ts in BOTH installer copies ahead of expiry -- see HCSEC-2026-03."); process.exit(1); }
            })().catch(function (err) { console.error("Key-expiry check FAILED: " + (err && err.message ? err.message : err)); process.exit(1); });
          '

  # ── Notify on failure ─────────────────────────────────
  notify-on-failure:
    name: Create issue on failure
    runs-on: ubuntu-latest
    needs: [ci, osv-scan, stale-dependabot, verify-marketplace-environment-protection, opentofu-cosign-canary, hashicorp-gpg-canary]
    if: failure() && github.event_name == 'schedule'
    permissions:
      issues: write
    steps:
      - name: Create failure issue
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const title = `Scheduled build failed — ${new Date().toISOString().slice(0,10)}`;
            const body = [
              '## Scheduled Build Failure',
              '',
              `**Workflow run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              '',
              'The weekly security scan failed. Please investigate and fix before the next release.',
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['bug', 'ci'],
            });
