---
name: CI

on:
  pull_request:
    branches:
      - main
      - development
  push:
    branches:
      - main
      - development
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  check-versions:
    name: Check Version Consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Validate version fields
        run: node scripts/check-versions.js

  build-and-test-v5:
    name: Build and Test V5 (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-2025]
    defaults:
      run:
        working-directory: Tasks/TerraformTask/TerraformTaskV5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
      - name: Install dependencies
        run: npm install --include=dev
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
      - name: Lint
        run: npx eslint src/ Tests/
      - name: Compile TypeScript
        run: npm run compile
      - name: Run unit tests with coverage
        run: npm run test:coverage

  build-and-test-installer-v1:
    name: Build and Test Installer V1 (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-2025]
    defaults:
      run:
        working-directory: Tasks/TerraformInstaller/TerraformInstallerV1
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
      - name: Install dependencies
        run: npm install --include=dev
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
      - name: Lint
        run: npx eslint src/
      - name: Compile TypeScript
        run: npm run compile
      - name: Run unit tests
        run: npm test

  build-and-test-tab:
    name: Build and Test Tab
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
      - name: Install dependencies
        run: npm install --include=dev
      - name: Type-check tab
        run: npx tsc -p src/tab/tsconfig.json --noEmit
      - name: Run tab unit tests
        run: npm run test:tab

  actionlint:
    name: Lint GitHub Actions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install actionlint
        shell: bash
        run: bash <(curl -sSf https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
      - name: Run actionlint
        run: ./actionlint -color
