---
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch: {}
  workflow_call: {}

permissions:
  contents: read

jobs:
  check-versions:
    name: Check Version Consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Validate version fields
        run: node scripts/check-versions.js
      - name: Validate task list consistency
        run: node scripts/check-task-list.js
      - name: Self-test check-versions.js
        run: node scripts/test-check-versions.js
      - name: Self-test check-minor-bumps.js
        run: node scripts/test-check-minor-bumps.js
      - name: Self-test bump-minor-versions.js
        run: node scripts/test-bump-minor-versions.js
      - name: Self-test check-task-list.js
        run: node scripts/test-check-task-list.js
      - name: Self-test check-per-file-coverage.js
        run: node scripts/test-check-per-file-coverage.js
      - name: Check for mojibake encoding corruption
        shell: bash
        # Catches recurrence of the UTF-8-decoded-as-Windows-1252 corruption
        # fixed in azure-devops-extension.json, where a plain em dash had
        # been mis-decoded into three separate replacement characters, by
        # scanning the whole repo for the same byte signature.
        run: |
          set -uo pipefail
          if grep -rIl --exclude-dir=.git --exclude-dir=node_modules --exclude-dir=build $'\xc3\xa2\xe2\x82\xac' .; then
            echo "::error::Mojibake encoding corruption found in the file(s) listed above (UTF-8 text mis-decoded as Windows-1252, then re-saved as UTF-8). Re-save as UTF-8 and replace the corrupted bytes with the intended character (e.g. a plain em dash)." >&2
            exit 1
          fi
          echo "No mojibake encoding corruption found."

  check-shared-modules:
    name: Check Shared Module Parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Validate shared installer modules are identical
        run: node scripts/check-shared-modules.js
      - name: Self-test check-shared-modules.js
        run: node scripts/test-check-shared-modules.js
      - name: Check for unregistered near-duplicate modules
        run: node scripts/check-near-duplicate-modules.js

  build-and-test-v5:
    name: Build and Test V5 (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-2025]
    defaults:
      run:
        working-directory: Tasks/TerraformTask/TerraformTaskV5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
      # --omit=dev above only audits this task's production dependencies. Its
      # devDependencies (eslint, mocha, ts-node, nyc, ...) execute real code in
      # the Lint/Compile/Test steps below the same as a production dependency
      # would, so they need the same gate (issue #753): a second, deliberately
      # overlapping audit with no --omit=dev, repeated identically in every
      # build-and-test-* job in this file.
      - name: Audit development dependencies
        run: npm audit --audit-level=high
      - name: Lint
        run: npx --no-install eslint src/ Tests/
      - name: Compile TypeScript
        run: npm run compile
      - name: Run unit tests with coverage
        run: npm run test:coverage
      # Every task.json in this repo declares a Node20_1 execution handler
      # alongside Node24 (see CLAUDE.md's task.json Schema Key Points) so older
      # on-prem/air-gapped agents without the Node 24 runner can still invoke
      # these tasks in production -- but until now nothing in CI ever ran
      # under Node 20, so a Node-20-incompatible change would ship invisible
      # (issue #654 named only this task and Provider Mirror V1; auditing the
      # rest of task.json/task.json shows all 11 declare the same handler, so
      # this step is repeated identically in every build-and-test-* job
      # below). Every step above runs under Node 24 (ts-node/mocha need it);
      # this re-points the runner's `node` at 20 and exercises the
      # ALREADY-COMPILED src/index.js the Node20_1 handler targets. With no
      # ADO input environment variables present, index.ts's own try/catch
      # always converts the resulting "input required" error into a caught
      # tasks.setResult(Failed, ...) and the process exits 0 (verified
      # locally, every task follows the same run()/try-catch/void run()
      # idiom) -- so the exit code alone is a reliable signal: zero means
      # Node 20 loaded and ran the compiled module graph successfully,
      # non-zero means a real incompatibility (e.g. a parse-time syntax error)
      # surfaced before that catch could run.
      - name: Set up Node 20 for Node20_1 handler smoke test
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
      - name: Verify compiled output runs under Node 20 (Node20_1 handler)
        run: node src/index.js

  # Real-terraform behavioral smoke harness (#719). Kept as a SEPARATE job from
  # build-and-test-v5 above (not folded into test:coverage) so the normal mock
  # suite stays terraform-free and fast, and local devs without terraform on
  # PATH still run it. See docs/initiatives/smoke-fuzz-testing-plan.md
  # Workstream 1 for the full design/rationale, and
  # Tests/SmokeL0.ts/Tests/SmokeTests/** for the scenarios themselves.
  build-and-test-v5-smoke:
    name: Build and Test V5 Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-2025]
    defaults:
      run:
        working-directory: Tasks/TerraformTask/TerraformTaskV5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: "1.15.7"
          terraform_wrapper: false
      - name: Run real-terraform smoke tests
        run: npm run test:smoke

  # Stable required-status-check context for the V5 smoke matrix, mirroring
  # build-and-test-tab-gate's identical rationale: branch protection pins a
  # bare context, but an OS matrix job only reports OS-suffixed contexts.
  build-and-test-v5-smoke-gate:
    name: Build and Test V5 Smoke
    needs: build-and-test-v5-smoke
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify all V5 smoke matrix legs passed
        if: needs.build-and-test-v5-smoke.result != 'success'
        run: exit 1

