---
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch: {}
  workflow_call: {}

permissions:
  contents: read

jobs:
  check-versions:
    name: Check Version Consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Validate version fields
        run: node scripts/check-versions.js

  check-shared-modules:
    name: Check Shared Module Parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Validate shared installer modules are identical
        run: node scripts/check-shared-modules.js

  build-and-test-v5:
    name: Build and Test V5 (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-2025]
    defaults:
      run:
        working-directory: Tasks/TerraformTask/TerraformTaskV5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
      - name: Install dependencies
        run: npm ci
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
      - name: Lint
        run: npx eslint src/ Tests/
      - name: Compile TypeScript
        run: npm run compile
      - name: Run unit tests with coverage
        run: npm run test:coverage

  build-and-test-installer-v1:
    name: Build and Test Installer V1 (${{ matrix.os }})
