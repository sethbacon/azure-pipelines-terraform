---
name: CodeQL

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "0 8 * * 1" # Every Monday 08:00 UTC

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: javascript-typescript
          # Default query pack is narrower than this credential-handling
          # codebase warrants (env-var/argv secret hygiene, URL/host
          # allowlisting, HCL/HTML injection guards) -- security-extended adds
          # materially more taint-flow/injection-class queries (issue #629).
          queries: security-extended
      - name: Autobuild
        uses: github/codeql-action/autobuild@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
